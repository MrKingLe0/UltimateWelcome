      - "           &d&lбҙЎбҙҮКҹбҙ„бҙҸбҙҚбҙҮ &f%player% &d&l!"
      - "       &9КңбҙҸбҙҳбҙҮ КҸбҙҸбҙң КңбҙҖбҙ бҙҮ бҙҖЙҙ &aбҙҖбҙҚбҙҖбҙўЙӘЙҙЙҙЙў &9sбҙӣбҙҖКҸ!"
