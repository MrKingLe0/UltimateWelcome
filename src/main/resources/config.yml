      - ""
      - "          &bбҙЎбҙҮКҷsЙӘбҙӣбҙҮ: &fwww.example.com"
      - "         &9бҙ…ЙӘsбҙ„бҙҸКҖбҙ…: &fdiscord.gg/example"
      - "========================================="
    vip:
      - "========================================="
      - "                &5&lsбҙҮКҖбҙ бҙҮКҖ_ЙҙбҙҖбҙҚбҙҮ"
      - ""
      - "          &d&lбҙЎбҙҮКҹбҙ„бҙҸбҙҚбҙҮ &a&lVIP &f%player% &d&l!"
      - "    &9бҙЎбҙҮ КңбҙҖбҙ бҙҮ КҷбҙҮбҙҮбҙ…Йҙ бҙЎбҙҖЙӘбҙӣЙӘЙҙЙў бҙҠбҙңsбҙӣ кң°бҙҸКҖ КҸбҙҸбҙң!"
      - ""
      - "          &bбҙЎбҙҮКҷsЙӘбҙӣбҙҮ: &fwww.example.com"
